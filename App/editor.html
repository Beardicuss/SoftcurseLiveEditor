<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Softcurse HTML Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@300;400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #050308;
        }

        body {
            font-family: 'Orbitron', system-ui, sans-serif;
            background: radial-gradient(circle at top, #120314 0%, #050308 30%, #050308 70%, #000 100%);
            color: #f5e9ff;
            position: relative;
        }

        .bg-fog {
            position: fixed;
            inset: -20%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(circle at 10% 20%, rgba(157,78,221,0.35), transparent 55%), radial-gradient(circle at 80% 10%, rgba(0,246,255,0.22), transparent 55%), radial-gradient(circle at 20% 85%, rgba(207,163,95,0.22), transparent 55%);
            mix-blend-mode: screen;
            animation: fogDrift 28s linear infinite alternate;
            opacity: 0.95;
        }

        @keyframes fogDrift {
            0% {
                transform: translate3d(-10px,-10px,0) scale(1);
            }

            50% {
                transform: translate3d(20px,10px,0) scale(1.05);
            }

            100% {
                transform: translate3d(-15px,12px,0) scale(1.02);
            }
        }

        .shell {
            position: relative;
            z-index: 1;
            height: 100%;
            padding: 10px 16px 12px;
            display: flex;
            flex-direction: column;
        }

        .frame {
            position: fixed;
            inset: 6px;
            border: 1px solid rgba(0,246,255,0.25);
            box-shadow: 0 0 18px rgba(0,246,255,0.35), 0 0 60px rgba(157,78,221,0.35);
            pointer-events: none;
        }

            .frame::before, .frame::after {
                content: "";
                position: absolute;
                left: 8%;
                right: 8%;
                height: 1px;
                background: linear-gradient(to right, transparent, rgba(0,246,255,0.7), transparent);
                opacity: 0.4;
            }

            .frame::before {
                top: 48px;
            }

            .frame::after {
                bottom: 34px;
            }

        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 6px;
        }

        .brand-title {
            font-size: 1.2rem;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: #f7f2ff;
            text-shadow: 0 0 10px rgba(0,246,255,0.9), 0 0 28px rgba(157,78,221,0.95);
        }

        .brand-sub {
            font-size: 0.55rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #cfa35f;
            opacity: 0.9;
        }

            .brand-sub span {
                color: #00f6ff;
            }

        .status-pill {
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            padding: 4px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0,246,255,0.4);
            background: linear-gradient(135deg, rgba(7,11,24,0.94), rgba(31,8,53,0.96));
            box-shadow: 0 0 12px rgba(0,246,255,0.7), 0 0 30px rgba(157,78,221,0.7);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00f6ff;
            box-shadow: 0 0 10px #00f6ff, 0 0 20px rgba(0,246,255,0.95);
            animation: pulseDot 1.4s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%,100% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.5);
                opacity: 1;
            }
        }

        .main-layout {
            flex: 1;
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .side-info {
            width: 220px;
            min-width: 190px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.6rem;
            text-transform: uppercase;
        }

        .info-card {
            border-radius: 6px;
            border: 1px solid rgba(0,246,255,0.28);
            background: linear-gradient(145deg, rgba(10,4,18,0.97), rgba(26,7,45,0.95));
            box-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 18px rgba(0,246,255,0.25);
            padding: 7px 9px;
            position: relative;
            overflow: hidden;
        }

            .info-card::before {
                content: "";
                position: absolute;
                inset: 2px;
                border-radius: 4px;
                border: 1px solid rgba(207,163,95,0.2);
                opacity: 0.7;
                pointer-events: none;
            }

        .info-title {
            color: #cfa35f;
            letter-spacing: 0.2em;
            font-size: 0.55rem;
            margin-bottom: 3px;
        }

        .info-body {
            color: #e3d9ff;
            line-height: 1.3;
            font-size: 0.58rem;
            opacity: 0.9;
        }

        .editor-panel {
            flex: 1;
            border-radius: 8px;
            border: 1px solid rgba(0,246,255,0.4);
            background: linear-gradient(145deg, rgba(10,4,18,0.98), rgba(20,5,36,0.98));
            box-shadow: 0 0 16px black, 0 0 30px rgba(0,246,255,0.45);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

            .editor-panel::before {
                content: "";
                position: absolute;
                inset: 7px;
                border-radius: 6px;
                border: 1px solid rgba(157,78,221,0.25);
                opacity: 0.8;
                pointer-events: none;
            }

        .editor-header {
            padding: 6px 12px 4px;
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #e9e0ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            .editor-header span.small {
                font-size: 0.58rem;
                opacity: 0.8;
                color: #cfa35f;
            }

        #container {
            flex: 1;
            margin: 6px 8px 10px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 12px black, 0 0 24px rgba(0,246,255,0.4);
        }

        footer {
            margin-top: 4px;
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #e8dcff;
            font-family: 'Cinzel Decorative', serif;
            text-shadow: 0 0 8px rgba(0,246,255,0.6), 0 0 18px rgba(157,78,221,0.8);
        }

            footer .author {
                color: #ffe8a4;
            }

            footer .org {
                color: #00f6ff;
            }

        .highlighted-line {
            background-color: rgba(255,230,128,0.45) !important;
        }

        .hover-line {
            background-color: rgba(0,246,255,0.26) !important;
        }

        .clicked-line {
            background-color: rgba(0,255,128,0.3) !important;
            border-left: 3px solid #00ff80;
        }

        @media (max-width: 1100px) {
            .side-info {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="bg-fog"></div>
    <div class="frame"></div>
    <div class="shell">
        <header>
            <div class="brand-main">
                <div class="brand-title">Softcurse HTML Editor</div>
                <div class="brand-sub">DARK CONCORD INTERFACE &nbsp;|&nbsp; <span>BOUND TO PREVIEW REALM</span></div>
            </div>
            <div class="status-pill"><div class="status-dot"></div><span>LINK: STABLE</span></div>
        </header>
        <div class="main-layout">
            <aside class="side-info">
                <div class="info-card"><div class="info-title">SESSION PROFILE</div><div class="info-body">MODE: HTML<br>REALM: UI / LAYOUT<br>SYNC: BI-DIRECTIONAL</div></div>
                <div class="info-card"><div class="info-title">USAGE HINT</div><div class="info-body">HOVER: MAP ELEMENTS<br>CLICK: HARD LINK<br>SAVE: MENU &amp; DISK</div></div>
            </aside>
            <section class="editor-panel">
                <div class="editor-header"><span>CODE SANCTUM</span><span class="small">BORDERLINE CURSED</span></div>
                <div id="container"></div>
            </section>
        </div>
        <footer><span class="label">Created by</span> <span class="author">Dante Berezinsky</span> · <span class="org">Softcurse Corp.</span></footer>
    </div>

    <!-- LOCAL Monaco Editor (no internet needed) -->
    <script src="vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': 'vs' } });

        let editor = null;
        let pendingCode = null;

        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('container'), {
                value: `<!DOCTYPE html>
<html>
<head><title>Softcurse Realm</title></head>
<body>
        <h1>Welcome to the Sanctum</h1>
        <p>Begin editing or open a file...</p>
</body>
</html>`,
                language: 'html',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 15,
                wordWrap: 'on',
                minimap: { enabled: false }
            });

            // Tell C# we are READY
            if (window.chrome?.webview) {
                window.chrome.webview.postMessage(JSON.stringify({ type: "editorReady" }));
            }

            // Apply any code that was sent before we were ready
            if (pendingCode !== null) {
                editor.setValue(pendingCode);
                pendingCode = null;
            }

            // Live sync to preview
            let timer = null;
            editor.onDidChangeModelContent(() => {
                if (timer) clearTimeout(timer);
                timer = setTimeout(() => {
                    if (window.chrome?.webview) {
                        window.chrome.webview.postMessage(JSON.stringify({
                            type: "codeChanged",
                            text: editor.getValue()
                        }));
                    }
                }, 300);
            });

            // Hover sync
            let hoverTimer = null;
            editor.onMouseMove(e => {
                if (!e.target?.position) return;
                const line = editor.getModel().getLineContent(e.target.position.lineNumber);
                const trimmed = line.trim();
                if (trimmed && window.chrome?.webview) {
                    clearTimeout(hoverTimer);
                    hoverTimer = setTimeout(() => {
                        window.chrome.webview.postMessage(JSON.stringify({
                            type: "hoverLine",
                            snippet: trimmed
                        }));
                    }, 80);
                }
            });

            editor.onMouseLeave(() => {
                clearTimeout(hoverTimer);
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(JSON.stringify({
                        type: "hoverLine",
                        snippet: ""
                    }));
                }
            });
        });

        // Listen for code from C# — works even if sent before editor exists
        if (window.chrome?.webview) {
            window.chrome.webview.addEventListener('message', event => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'setCode' && data.text !== undefined) {
                        if (editor) {
                            editor.setValue(data.text);
                        } else {
                            pendingCode = data.text; // store for when editor loads
                        }
                    }
                } catch (e) { }
            });
        }
    </script>
</body>
</html>
